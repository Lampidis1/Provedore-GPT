<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Proveedores AMSA V92</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f8fa;
margin:0;
padding:30px
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1)
}

h1{
color:#007b8f;
margin-bottom:5px
}

p{
color:#555
}

label{
display:block;
margin-top:15px;
font-weight:bold;
font-size:13px
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#007b8f;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer
}

button:hover{
background:#006374
}

.status{
margin-top:20px;
padding:12px;
background:#f0f7f9;
border-radius:8px;
font-size:14px
}

</style>
</head>

<body>

<div class="container">

<h1>Directorio de Proveedores</h1>
<p>Antofagasta Minerals · V92</p>

<label>Sheet ID</label>
<input id="sheetId" value="1YMCR6n5S5s3zjM1NpbRzdJD3VWhRAkn-mqHwqiF7JDE">

<label>App Web URL</label>
<input id="appUrl" value="https://script.google.com/macros/s/AKfycbypo1jnKMWbYZthuLXxwKjhwXDlID89UqC2ySInpBTKg8T-qqWajlE8-J0-chJYkmvX/exec">

<button onclick="conectar()">Conectar al sistema</button>

<div class="status" id="status">
Sistema listo para conectar
</div>

</div>

<script>

async function conectar(){

const url = document.getElementById("appUrl").value

document.getElementById("status").innerText = "Conectando..."

try{

const res = await fetch(url + "?action=listBundle")
const data = await res.json()

document.getElementById("status").innerText =
"Conectado correctamente. Proveedores cargados: "
+ (data.proveedores?.length || 0)

}catch(e){

document.getElementById("status").innerText =
"Error de conexión. Revisa el Apps Script."

}

}

</script>

</body>
</html>
